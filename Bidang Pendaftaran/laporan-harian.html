<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Harian - Bidang Pendaftaran MBLB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full lg:translate-x-0 bg-gradient-to-b from-indigo-900 to-indigo-800 text-white custom-scrollbar overflow-y-auto">
        <div class="h-full px-3 py-4">
            <div class="flex items-center justify-center mb-8 pb-4 border-b border-indigo-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-mountain text-2xl text-indigo-600"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg">MBLB</h2>
                        <p class="text-xs text-indigo-200">Bidang Pendaftaran</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-menu space-y-2">
                <!-- Dynamic sidebar populated by shared.js renderDynamicSidebar() -->
            </nav>
        </div>
    </aside>

    <div class="lg:ml-64 flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="bg-white border-b border-gray-100 flex items-center justify-between px-6 py-4">
            <h1 class="text-xl font-bold text-gray-900">Laporan Harian</h1>
        </header>
        <main class="p-10 flex flex-col items-center justify-center h-full text-center">
            <div class="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center mb-6">
                <i class="fa-solid fa-file-invoice-dollar text-4xl text-indigo-300"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Rekap Transaksi Harian</h2>
            <p class="text-gray-500 max-w-md">Ringkasan aktivitas pendaftaran dan penerimaan pembayaran untuk laporan
                pertanggungjawaban harian.</p>
        </main>
    </div>
    <script src="../shared.js"></script>
</body>

</html>
