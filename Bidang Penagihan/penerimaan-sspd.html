<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penerimaan SSPD - Bidang Penagihan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
</head>

<body class="bg-gray-50">
    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full lg:translate-x-0 bg-gradient-to-b from-indigo-950 to-indigo-900 text-white custom-scrollbar overflow-y-auto">
        <div class="h-full px-3 py-4">
            <div class="flex items-center justify-center mb-8 pb-4 border-b border-indigo-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-file-invoice-dollar text-2xl text-indigo-700"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg leading-none">MBLB</h2>
                        <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-wider mt-1">Bidang Penagihan
                        </p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-menu space-y-2">
                <!-- Dynamic sidebar populated by shared.js renderDynamicSidebar() -->
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <div id="mainContent" class="lg:ml-64 transition-smooth">
        <!-- Top Navbar -->
        <nav class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-30 shadow-sm">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                    <i class="fa-solid fa-bars text-xl text-gray-600"></i>
                </button>
                <div>
                    <h1 class="text-xl font-bold text-gray-900">Penerimaan (SSPD)</h1>
                    <p class="text-sm text-gray-500">Input setoran tunai atau transfer bank</p>
                </div>
            </div>
        </nav>

        <main class="p-6">
            <div class="max-w-2xl mx-auto">
                <div class="bg-white rounded-[3rem] shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-10 bg-indigo-600 text-white relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-48 h-48 bg-white/10 rounded-full -mr-24 -mt-24"></div>
                        <h3 class="text-2xl font-black relative z-10">FORM PENERIMAAN</h3>
                        <p class="text-indigo-100 text-sm relative z-10">Dokumentasikan pembayaran pajak WP</p>
                    </div>

                    <form onsubmit="handlePayment(event)" class="p-10 space-y-6">
                        <!-- WP Selector - Disabled if intent exists -->
                        <div>
                            <label
                                class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Pilih
                                Dokumen SPTPD</label>
                            <select id="sptpdSelector" required
                                class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-indigo-500/20"
                                onchange="loadSkpdInfo(this.value)">
                                <option value="">-- Pilih SPTPD --</option>
                                <!-- Populated by JS -->
                            </select>
                        </div>

                        <!-- Info Card -->
                        <div id="skpdOverview" class="hidden animate-slide-up">
                            <div class="bg-indigo-50 border border-indigo-100 rounded-[2rem] p-8 text-center">
                                <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2">Jumlah
                                    Yang Harus Dibayar</p>
                                <p class="text-4xl font-black text-indigo-950 mb-2" id="displayAmount">Rp 0</p>
                                <p class="text-xs font-bold text-indigo-600 uppercase" id="displayWp">-</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label
                                    class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Tanggal
                                    Bayar</label>
                                <input type="date" id="paymentDate" required onchange="reloadSkpdIfSelected()"
                                    class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold outline-none">
                            </div>
                            <div>
                                <label
                                    class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Cara
                                    Bayar</label>
                                <select id="paymentMethod" required
                                    class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold outline-none">
                                    <option value="Bank">Transfer Bank</option>
                                    <option value="Tunai">Tunai / Loket</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label
                                class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Bank
                                Penerima / Keterangan</label>
                            <input type="text" id="bankInfo" value="Bank Bengkulu Cabang Tais"
                                class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold outline-none">
                        </div>

                        <div class="pt-6">
                            <button type="submit"
                                class="w-full py-6 bg-indigo-600 text-white font-black rounded-3xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center gap-3 text-lg">
                                <i class="fa-solid fa-receipt"></i> SIMPAN & VERIFIKASI LUNAS
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-6 text-center">
        <div class="absolute inset-0 bg-indigo-950/90 backdrop-blur-md"></div>
        <div class="bg-white rounded-[40px] p-10 max-w-sm w-full animate-scale-up shadow-2xl">
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-shield-check text-5xl text-green-600"></i>
            </div>
            <h2 class="text-3xl font-black text-indigo-950 mb-3">LUNAS!</h2>
            <p class="text-sm text-gray-400 font-bold mb-8 uppercase tracking-widest leading-relaxed">Pembayaran telah
                diverifikasi. SPTPD otomatis terupdate menjadi Lunas.</p>
            <button onclick="window.location.href='dashboard.html'"
                class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">KEMBALI KE
                BERANDA</button>
        </div>
    </div>

    <script src="../seed-data.js"></script>
    <script src="../shared.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('mblb_current_user') || '{}');
        if (!currentUser.role || currentUser.role !== 'Bidang Penagihan') window.location.href = '../login.html';

        const skpds = JSON.parse(localStorage.getItem('mblb_draft_sptpd') || '[]');
        const wps = JSON.parse(localStorage.getItem('mblb_wajib_pajak') || '[]');

        function initPage() {
            // Populate select
            const selector = document.getElementById('sptpdSelector');
            const unpaids = skpds.filter(s => s.status === 'approved');

            selector.innerHTML = '<option value="">-- Pilih SPTPD --</option>' +
                unpaids.map(s => {
                    const wp = wps.find(w => w.id === s.wpId);
                    return `<option value="${s.id}">${s.nomor} - ${wp?.namaUsaha || 'Unknown'}</option>`;
                }).join('');

            document.getElementById('paymentDate').value = new Date().toISOString().split('T')[0];

            // Check for intent from billing list
            const intent = localStorage.getItem('mblb_payment_intent');
            if (intent) {
                selector.value = intent;
                loadSkpdInfo(intent);
                localStorage.removeItem('mblb_payment_intent');
            }
        }

        function reloadSkpdIfSelected() {
            const id = document.getElementById('sptpdSelector').value;
            if (id) loadSkpdInfo(id);
        }

        function loadSkpdInfo(id) {
            const overview = document.getElementById('skpdOverview');
            if (!id) {
                overview.classList.add('hidden');
                return;
            }

            const skpd = skpds.find(s => s.id === id);
            const wp = wps.find(w => w.id === skpd.wpId);

            // Hitung Denda Keterlambatan
            const paymentDate = document.getElementById('paymentDate').value || new Date().toISOString().split('T')[0];
            const pokok = skpd.nilaiPajak || skpd.total;
            const { nominalBunga } = hitungBunga(pokok, skpd.jatuhTempo, paymentDate);
            const finalTotal = pokok + nominalBunga;

            // Simpan sementara di dataset
            overview.dataset.currentTotal = finalTotal;

            document.getElementById('displayAmount').textContent = formatCurrency(finalTotal);
            document.getElementById('displayWp').textContent = wp?.namaUsaha || 'Unknown';
            overview.classList.remove('hidden');

            // Tambahkan warning denda jika ada
            if (nominalBunga > 0) {
                if (!document.getElementById('penaltyWarn')) {
                   document.getElementById('displayAmount').insertAdjacentHTML('afterend', `<p id="penaltyWarn" class="text-xs font-bold text-red-500 mt-2 bg-red-50 rounded px-3 py-1.5 inline-block border border-red-100"><i class="fa-solid fa-triangle-exclamation mr-1"></i>Termasuk Denda: ${formatCurrency(nominalBunga)}</p>`);
                } else {
                   document.getElementById('penaltyWarn').innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i>Termasuk Denda: ${formatCurrency(nominalBunga)}`;
                }
            } else {
                if (document.getElementById('penaltyWarn')) document.getElementById('penaltyWarn').remove();
            }
        }

        function handlePayment(e) {
            e.preventDefault();
            const skpdId = document.getElementById('sptpdSelector').value;
            const skpd = skpds.find(s => s.id === skpdId);
            if (!skpd) return;

            // 1. Create SSPD
            const sspds = JSON.parse(localStorage.getItem('mblb_sspd') || '[]');
            const overview = document.getElementById('skpdOverview');
            const totalPaid = parseInt(overview.dataset.currentTotal) || skpd.total;

            const newSspd = {
                id: 'SSPD' + Date.now(),
                nomor: generateDocNumber('SSPD', '04'),
                tanggal: document.getElementById('paymentDate').value,
                wpId: skpd.wpId,
                skpdId: skpd.id,
                jumlahBayar: totalPaid,
                jumlah: totalPaid,
                caraBayar: document.getElementById('paymentMethod').value,
                bankPenerima: document.getElementById('bankInfo').value,
                status: 'verified'
            };
            sspds.push(newSspd);
            localStorage.setItem('mblb_sspd', JSON.stringify(sspds));

            // 2. Mark SKPD as paid
            const updatedSkpds = skpds.map(s => {
                if (s.id === skpdId) return { ...s, status: 'paid' };
                return s;
            });
            localStorage.setItem('mblb_draft_sptpd', JSON.stringify(updatedSkpds));

            document.getElementById('successModal').classList.remove('hidden');
        }

        initPage();
    </script>
</body>

</html>
