<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penugasan Staff - Kabid Penetapan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
</head>

<body class="bg-gray-50">
    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full lg:translate-x-0 bg-gradient-to-b from-indigo-900 to-indigo-800 text-white custom-scrollbar overflow-y-auto">
        <div class="h-full px-3 py-4">
            <div class="flex items-center justify-center mb-8 pb-4 border-b border-indigo-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-mountain text-2xl text-indigo-600"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg">MBLB</h2>
                        <p class="text-xs text-indigo-200">Kabid Penetapan</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-menu space-y-2">
                <!-- Dynamic sidebar populated by shared.js renderDynamicSidebar() -->
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <div id="mainContent" class="lg:ml-64 transition-smooth">
        <!-- Top Navbar -->
        <nav class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-30 shadow-sm">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                        <i class="fa-solid fa-bars text-xl text-gray-600"></i>
                    </button>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Penugasan Staff</h1>
                        <p class="text-sm text-gray-500">Kelola instruksi kerja petugas lapangan</p>
                    </div>
                </div>
                <button onclick="openModal('addTaskModal')"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 shadow-lg shadow-indigo-100 transition-all active:scale-95">
                    <i class="fa-solid fa-plus-circle"></i> Buat Tugas Baru
                </button>
            </div>
        </nav>

        <main class="p-6">
            <!-- Summary Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 text-center">
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <p class="text-xs font-black text-gray-400 uppercase tracking-widest mb-1">Total</p>
                    <p class="text-2xl font-black text-indigo-900" id="statTotal">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <p class="text-xs font-black text-orange-400 uppercase tracking-widest mb-1">Pending</p>
                    <p class="text-2xl font-black text-orange-600" id="statPending">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <p class="text-xs font-black text-blue-400 uppercase tracking-widest mb-1">Proses</p>
                    <p class="text-2xl font-black text-blue-600" id="statProses">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <p class="text-xs font-black text-green-400 uppercase tracking-widest mb-1">Selesai</p>
                    <p class="text-2xl font-black text-green-600" id="statSelesai">0</p>
                </div>
            </div>

            <!-- Task List -->
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50/50">
                        <tr>
                            <th class="p-4 text-[10px] font-black uppercase text-gray-400 tracking-widest">Tugas & Staff
                            </th>
                            <th class="p-4 text-[10px] font-black uppercase text-gray-400 tracking-widest">Objek / WP
                            </th>
                            <th class="p-4 text-[10px] font-black uppercase text-gray-400 tracking-widest">Status</th>
                            <th class="p-4 text-[10px] font-black uppercase text-gray-400 tracking-widest text-center">
                                Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="taskList" class="divide-y divide-gray-50">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Task Modal -->
    <div id="addTaskModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-indigo-950/40 backdrop-blur-sm" onclick="closeModal('addTaskModal')"></div>
        <div class="modal-container w-full max-w-lg relative z-10">
            <!-- Modal Header -->
            <div class="modal-header-clean">
                <div>
                    <h3 class="text-xl font-bold text-gray-900">Buat Penugasan Baru</h3>
                    <p class="text-sm text-gray-500">Pilih petugas dan objek pengawasan</p>
                </div>
                <button onclick="closeModal('addTaskModal')" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 transition-colors">
                    <i class="fa-solid fa-times text-lg"></i>
                </button>
            </div>

            <!-- Modal Body -->
            <form onsubmit="saveTask(event)" class="p-6 space-y-6">
                <!-- Data Petugas & Objek -->
                <div class="card-section bg-gray-50/50">
                    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 flex items-center">
                        <span class="step-badge">1</span> Informasi Dasar
                    </h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Pilih Petugas</label>
                            <select id="taskStaff" required
                                class="w-full p-3 bg-white border border-gray-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm">
                                <option value="">-- Pilih --</option>
                                <option value="staff">Budi Santoso (Staff 1)</option>
                                <option value="staff2">Andi Wijaya (Staff 2)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Pilih Objek / WP</label>
                            <select id="taskWp" required
                                class="w-full p-3 bg-white border border-gray-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm">
                                <!-- WP list populated by JS -->
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Detail Tugas -->
                <div class="card-section">
                    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 flex items-center">
                        <span class="step-badge">2</span> Detail Instruksi
                    </h4>
                    <div class="space-y-4">
                        <div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Jenis Tugas</label>
                            <input type="text" id="taskType" required placeholder="Misal: Verifikasi Lokasi Baru"
                                class="w-full p-3 bg-gray-50/50 border border-gray-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Catatan</label>
                            <textarea id="taskNotes" rows="2"
                                class="w-full p-3 bg-gray-50/50 border border-gray-200 rounded-xl font-semibold outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm"
                                placeholder="Tambahkan instruksi khusus jika ada..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Footer Buttons -->
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal('addTaskModal')"
                        class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition-all active:scale-95">
                        Batal
                    </button>
                    <button type="submit"
                        class="flex-[2] py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-paper-plane text-sm"></i>
                        Simpan Penugasan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../seed-data.js"></script>
    <script src="../shared.js"></script>
    <script>
        // Auth check
        const currentUser = JSON.parse(localStorage.getItem('mblb_current_user') || '{}');
        if (!currentUser.role || currentUser.role !== 'Kabid Penetapan') window.location.href = '../login.html';

        function init() {
            renderTasks();
            populateWpSelect();
        }

        function populateWpSelect() {
            const wps = JSON.parse(localStorage.getItem('mblb_wajib_pajak') || '[]');
            const select = document.getElementById('taskWp');
            select.innerHTML = '<option value="">-- Pilih WP --</option>' +
                wps.map(w => `<option value="${w.id}">${w.namaUsaha}</option>`).join('');
        }

        function renderTasks() {
            const tasks = JSON.parse(localStorage.getItem('mblb_penugasan') || '[]');
            const wps = JSON.parse(localStorage.getItem('mblb_wajib_pajak') || '[]');
            const container = document.getElementById('taskList');

            // Stats
            document.getElementById('statTotal').textContent = tasks.length;
            document.getElementById('statPending').textContent = tasks.filter(t => t.status === 'pending').length;
            document.getElementById('statProses').textContent = tasks.filter(t => t.status === 'on-progress').length;
            document.getElementById('statSelesai').textContent = tasks.filter(t => t.status === 'completed').length;

            if (tasks.length === 0) {
                container.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-400 font-bold uppercase tracking-widest">Belum ada penugasan</td></tr>';
                return;
            }

            container.innerHTML = tasks.reverse().map(t => {
                const wp = wps.find(w => w.id === t.wpId);
                const statusClasses = {
                    'pending': 'badge-warning',
                    'on-progress': 'badge-info',
                    'completed': 'badge-success'
                };

                return `
                    <tr class="hover:bg-gray-50/50 transition-colors">
                        <td class="p-4">
                            <p class="font-black text-indigo-950 text-sm">${t.taskType}</p>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mt-0.5">Petugas: ${t.staffId === 'staff' ? 'Budi Santoso' : t.staffId}</p>
                        </td>
                        <td class="p-4">
                            <p class="font-bold text-gray-700 text-sm">${wp?.namaUsaha || 'Unknown'}</p>
                            <p class="text-[10px] text-gray-400 font-bold">${wp?.alamat || '-'}</p>
                        </td>
                        <td class="p-4">
                            <span class="badge ${statusClasses[t.status] || 'badge-gray'}">
                                ${t.status}
                            </span>
                        </td>
                        <td class="p-4 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <button class="w-8 h-8 rounded-lg bg-gray-50 text-indigo-600 hover:bg-indigo-50 transition-colors"><i class="fa-solid fa-eye text-xs"></i></button>
                                <button onclick="deleteTask('${t.id}')" class="w-8 h-8 rounded-lg bg-gray-50 text-red-500 hover:bg-red-50 transition-colors"><i class="fa-solid fa-trash-can text-xs"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function saveTask(e) {
            e.preventDefault();
            const wpId = document.getElementById('taskWp').value;
            const taskType = document.getElementById('taskType').value;
            const notes = document.getElementById('taskNotes').value;

            const newTask = {
                id: 'TGS' + Date.now(),
                staffId,
                wpId,
                taskType,
                deadline: null, 
                notes,
                priority: 'Normal',
                status: 'pending',
                dateCreated: new Date().toISOString()
            };

            const tasks = JSON.parse(localStorage.getItem('mblb_penugasan') || '[]');
            tasks.push(newTask);
            localStorage.setItem('mblb_penugasan', JSON.stringify(tasks));

            showToast('Penugasan berhasil dikirim!', 'success');
            closeModal('addTaskModal');
            renderTasks();
            e.target.reset();
        }

        function deleteTask(id) {
            if (confirm('Batalkan penugasan ini?')) {
                let tasks = JSON.parse(localStorage.getItem('mblb_penugasan') || '[]');
                tasks = tasks.filter(t => t.id !== id);
                localStorage.setItem('mblb_penugasan', JSON.stringify(tasks));
                renderTasks();
                showToast('Penugasan dibatalkan', 'info');
            }
        }

        init();
    </script>
</body>

</html>
