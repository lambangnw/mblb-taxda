<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kabid Penetapan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
</head>

<body class="bg-gray-50">
    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full lg:translate-x-0 bg-gradient-to-b from-indigo-900 to-indigo-800 text-white custom-scrollbar overflow-y-auto">
        <div class="h-full px-3 py-4">
            <div class="flex items-center justify-center mb-8 pb-4 border-b border-indigo-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-mountain text-2xl text-indigo-600"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg">MBLB</h2>
                        <p class="text-xs text-indigo-200">Kabid Penetapan</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-menu space-y-2">
                <!-- Dynamic sidebar populated by shared.js renderDynamicSidebar() -->
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <div id="mainContent" class="lg:ml-64 transition-smooth">
        <!-- Top Navbar -->
        <nav class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-30 shadow-sm">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                        <i class="fa-solid fa-bars text-xl text-gray-600"></i>
                    </button>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Executive Dashboard</h1>
                        <p class="text-sm text-gray-500">Overview Kinerja & Persetujuan</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <button onclick="toggleDropdown('profileDropdown')"
                            class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-100">
                            <div
                                class="w-8 h-8 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center text-white font-bold">
                                K
                            </div>
                            <div class="hidden md:block text-left">
                                <p class="text-sm font-semibold text-gray-900" id="userName">Kabid</p>
                                <p class="text-xs text-gray-500">Kepala Bidang</p>
                            </div>
                            <i class="fa-solid fa-chevron-down text-sm text-gray-600"></i>
                        </button>
                        <div id="profileDropdown"
                            class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <button onclick="logout()"
                                class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                                <i class="fa-solid fa-right-from-bracket w-4 text-center mr-2"></i>Keluar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Dashboard Content -->
        <main class="p-6">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <!-- Pending Approval -->
                <div class="bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 card-hover flex items-center gap-5 relative overflow-hidden group transition-all">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-50 rounded-full opacity-50 group-hover:scale-110 transition-transform"></div>
                    <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-100 shrink-0 relative z-10 transition-transform group-hover:rotate-6">
                        <i class="fa-solid fa-file-signature text-2xl"></i>
                    </div>
                    <div class="relative z-10 text-left">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 leading-none">Menunggu Acc</p>
                        <h3 class="text-3xl font-black text-gray-900 leading-none" id="pendingApprovalCount">0</h3>
                        <p class="text-[10px] text-indigo-500 font-bold mt-2 uppercase tracking-tight leading-none">Nota Perhitungan</p>
                    </div>
                </div>

                <!-- Realisasi PAD -->
                <div class="bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 card-hover flex items-center gap-5 relative overflow-hidden group transition-all">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-50 rounded-full opacity-50 group-hover:scale-110 transition-transform"></div>
                    <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-emerald-100 shrink-0 relative z-10 transition-transform group-hover:rotate-6">
                        <i class="fa-solid fa-chart-line text-2xl"></i>
                    </div>
                    <div class="relative z-10 text-left">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 leading-none">Realisasi PAD</p>
                        <h3 class="text-2xl font-black text-gray-900 leading-none" id="realisasiPAD">Rp 0</h3>
                        <p class="text-[10px] text-emerald-500 font-bold mt-2 uppercase tracking-tight leading-none">Bulan Ini</p>
                    </div>
                </div>

                <!-- Piutang -->
                <div class="bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 card-hover flex items-center gap-5 relative overflow-hidden group transition-all">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-red-50 rounded-full opacity-50 group-hover:scale-110 transition-transform"></div>
                    <div class="w-16 h-16 bg-red-500 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-red-100 shrink-0 relative z-10 transition-transform group-hover:rotate-6">
                        <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
                    </div>
                    <div class="relative z-10 text-left">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 leading-none">Tunggakan</p>
                        <h3 class="text-3xl font-black text-gray-900 leading-none" id="piutangCount">0</h3>
                        <p class="text-[10px] text-red-500 font-bold mt-2 uppercase tracking-tight leading-none">WP Belum Bayar</p>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Approval Graph Placeholder -->
                <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-bold text-lg text-gray-900">Trend Penerbitan SKPD</h3>
                        <div class="flex gap-2">
                            <span class="w-3 h-3 bg-indigo-500 rounded-full inline-block"></span>
                            <span class="text-xs text-gray-500">Tahun Ini</span>
                        </div>
                    </div>
                    <div
                        class="h-64 bg-gray-50 rounded-xl flex items-center justify-center border-2 border-dashed border-gray-200">
                        <div class="text-center">
                            <i class="fa-solid fa-chart-column text-4xl text-gray-300 mb-2"></i>
                            <p class="text-gray-400 font-semibold">Grafik Analitik (Placeholder)</p>
                        </div>
                    </div>
                </div>

                <!-- Recent Pendings -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-lg text-gray-900 mb-4">Menunggu Persetujuan</h3>
                    <div id="pendingList" class="space-y-3">
                        <!-- Populated JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../seed-data.js"></script>
    <script src="../shared.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('mblb_current_user') || '{}');
        if (!currentUser.role || currentUser.role !== 'Kabid Penetapan') {
            window.location.href = '../index.html';
        }
        if (document.getElementById('userName')) {
            document.getElementById('userName').textContent = currentUser.nama || currentUser.name || 'Kabid';
        }

        const notas = JSON.parse(localStorage.getItem('mblb_nota_perhitungan') || '[]');
        const skpds = JSON.parse(localStorage.getItem('mblb_skpd') || '[]');

        // Stats
        const pendingNotas = notas.filter(n => n.status === 'pending');
        document.getElementById('pendingApprovalCount').textContent = pendingNotas.length;

        // Realisasi (Paid SKPDs only - simplistic check)
        const paidSkpds = skpds.filter(s => s.status === 'paid');
        const totalRealisasi = paidSkpds.reduce((acc, curr) => acc + curr.total, 0);
        document.getElementById('realisasiPAD').textContent = formatCurrency(totalRealisasi);

        // Piutang
        const overdueSkpds = skpds.filter(s => s.status === 'unpaid');
        document.getElementById('piutangCount').textContent = overdueSkpds.length;

        // Pending List
        const listContainer = document.getElementById('pendingList');
        if (pendingNotas.length === 0) {
            listContainer.innerHTML = `<div class="text-center py-8 text-gray-500"><i class="fa-solid fa-check-circle text-4xl mb-2 text-green-300"></i><p>Semua dokumen telah disetujui.</p></div>`;
        } else {
            listContainer.innerHTML = pendingNotas.slice(0, 3).map(n => {
                const wp = getWajibPajakById(n.wpId);
                return `
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors cursor-pointer border border-transparent hover:border-gray-200" onclick="window.location.href='monitoring-sptpd.html'">
                        <div>
                            <p class="font-bold text-gray-900 text-sm">${wp?.namaUsaha || 'Unknown'}</p>
                            <p class="text-xs text-gray-500">${n.nomor}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-indigo-600 font-bold text-sm block">${formatCurrency(n.total)}</span>
                            <span class="text-xs text-orange-500">Menunggu</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>

</html>
