<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Laporan - Staff Lapangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
    <style>
        .item-list-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }

        .item-dot {
            @apply w-1.5 h-1.5 rounded-full bg-indigo-500;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans antialiased text-gray-900 pb-24">
    <header class="bg-indigo-600 text-white p-4 sticky top-0 z-50 shadow-md flex items-center gap-4">
        <a href="dashboard.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/20 backdrop-blur-md border border-white/10 text-white">
            <i class="fa-solid fa-arrow-left text-lg"></i>
        </a>
        <div>
            <h1 class="font-bold text-lg tracking-tight leading-none mb-1">Riwayat Laporan</h1>
            <p class="text-[10px] text-indigo-100 font-bold uppercase tracking-widest">Monitoring Aktivitas Lapangan</p>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div
            class="bg-white rounded-[32px] p-2 shadow-sm border border-gray-100 mb-6 sticky top-[80px] z-40 backdrop-blur-md bg-white/80 border-white/50">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Cari perusahaan atau material..."
                    class="w-full pl-12 pr-4 py-4 bg-gray-50/50 border border-transparent rounded-[24px] focus:ring-2 focus:ring-indigo-500/20 focus:bg-white outline-none transition-all font-bold text-sm text-gray-700"
                    onkeyup="filterReports()">
                <i class="fa-solid fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-300 font-bold"></i>
            </div>
        </div>

        <!-- Reports List -->
        <div id="reportsList" class="space-y-4">
            <!-- Populated by JS -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden py-20 text-center">
            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-folder-open text-4xl text-gray-200"></i>
            </div>
            <h3 class="font-black text-gray-400">TIDAK ADA DATA</h3>
            <p class="text-[10px] text-gray-300 font-bold uppercase tracking-widest px-10">Belum ada laporan pengawasan
                yang tercatat</p>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-200 px-6 py-3 flex justify-around items-center shadow-lg z-40">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-gray-400 transition-colors group">
            <div class="p-1.5 rounded-xl group-hover:bg-indigo-50"><i class="fa-solid fa-home text-lg"></i></div>
            <span class="text-[10px] font-black uppercase tracking-tighter">Home</span>
        </a>
        <a href="input-laporan.html" class="flex flex-col items-center gap-1 text-gray-400 transition-colors group">
            <div class="p-1.5 rounded-xl group-hover:bg-indigo-50"><i class="fa-solid fa-plus-circle text-lg"></i></div>
            <span class="text-[10px] font-black uppercase tracking-tighter">Input</span>
        </a>
        <a href="riwayat-laporan.html" class="flex flex-col items-center gap-1 text-indigo-600">
            <div class="p-1.5 rounded-xl bg-indigo-50"><i class="fa-solid fa-file-shield text-lg"></i></div>
            <span class="text-[10px] font-black uppercase tracking-tighter">Riwayat</span>
        </a>
    </nav>

    <script src="../seed-data.js"></script>
    <script src="../shared.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('mblb_current_user') || '{}');
        if (!currentUser.role || currentUser.role !== 'Staff Lapangan') window.location.href = '../login.html';

        let allReports = [];

        function loadReports() {
            allReports = JSON.parse(localStorage.getItem('mblb_laporan_harian') || '[]');
            allReports.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
            displayReports(allReports);
        }

        function displayReports(reports) {
            const container = document.getElementById('reportsList');
            const emptyState = document.getElementById('emptyState');

            if (reports.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            container.innerHTML = reports.map(report => {
                const wp = getWajibPajakById(report.wpId);

                // Content for items list
                let itemsHtml = '';
                if (report.items && Array.isArray(report.items)) {
                    // Modern multi-item report
                    itemsHtml = report.items.map(item => `
                        <div class="flex items-center justify-between p-3 bg-gray-50/50 rounded-xl border border-gray-100">
                            <div class="flex items-center gap-2">
                                <div class="item-dot"></div>
                                <span class="text-[11px] font-black text-indigo-950 uppercase tracking-tight">${item.nama}</span>
                            </div>
                            <span class="text-[11px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md border border-indigo-100">${item.volume} m³</span>
                        </div>
                    `).join('');
                } else {
                    // Legacy single-item report
                    const mineral = getJenisMineralById(report.jenisMineral);
                    itemsHtml = `
                        <div class="flex items-center justify-between p-3 bg-gray-50/50 rounded-xl border border-gray-100">
                            <div class="flex items-center gap-2">
                                <div class="item-dot"></div>
                                <span class="text-[11px] font-black text-indigo-950 uppercase tracking-tight">${mineral?.nama || report.jenisMineral}</span>
                            </div>
                            <span class="text-[11px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md border border-indigo-100">${report.volume} m³</span>
                        </div>
                    `;
                }

                return `
                    <div class="bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 relative overflow-hidden group hover:shadow-xl transition-all duration-300 border-b-4 border-b-indigo-50">
                        <div class="flex items-start justify-between gap-4 mb-5 relative z-10">
                            <div class="flex-1">
                                <h4 class="font-bold text-gray-900 text-lg mb-1 leading-tight">${wp?.namaUsaha || 'Unknown WP'}</h4>
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">${formatDate(report.tanggal, 'short')}</span>
                                    <div class="w-1 h-1 rounded-full bg-gray-200"></div>
                                    <span class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest">${report.id}</span>
                                </div>
                            </div>
                            <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-500 shadow-sm group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                <i class="fa-solid fa-truck-pickup text-xl"></i>
                            </div>
                        </div>

                        <!-- Item list -->
                        <div class="space-y-2 mb-6 relative z-10">
                            ${itemsHtml}
                        </div>

                        <div class="flex items-start gap-4 p-4 bg-gray-50 rounded-2xl border border-gray-100 mb-6">
                            <div class="w-10 h-10 rounded-xl bg-white border border-gray-100 flex items-center justify-center text-red-400 flex-shrink-0 shadow-sm">
                                <i class="fa-solid fa-location-dot"></i>
                            </div>
                            <div>
                                <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-0.5">Titik Pengawasan</p>
                                <p class="text-[11px] text-gray-600 font-bold leading-tight line-clamp-2">${report.lokasi}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 relative z-10">
                             <button class="py-4 bg-white text-gray-500 text-[10px] font-black uppercase tracking-widest rounded-2xl border border-gray-100 hover:bg-gray-50 transition-all active:scale-95">
                                <i class="fa-solid fa-eye mr-2"></i> Detail
                             </button>
                             <button class="py-4 bg-indigo-600 text-white text-[10px] font-black uppercase tracking-widest rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95">
                                <i class="fa-solid fa-print mr-2"></i> Cetak
                             </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterReports() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allReports.filter(report => {
                const wp = getWajibPajakById(report.wpId);

                // Check in WP Name
                const inWp = (wp?.namaUsaha || '').toLowerCase().includes(searchTerm);

                // Check in Materials
                let inMaterials = false;
                if (report.items && Array.isArray(report.items)) {
                    inMaterials = report.items.some(item => item.nama.toLowerCase().includes(searchTerm));
                } else {
                    const mineral = getJenisMineralById(report.jenisMineral);
                    inMaterials = (mineral?.nama || '').toLowerCase().includes(searchTerm);
                }

                // Check in Location
                const inLokasi = (report.lokasi || '').toLowerCase().includes(searchTerm);

                return inWp || inMaterials || inLokasi;
            });
            displayReports(filtered);
        }

        loadReports();
    </script>
</body>

</html>
