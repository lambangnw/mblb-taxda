<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar SPTPD - Admin Penetapan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full lg:translate-x-0 bg-gradient-to-b from-indigo-900 to-indigo-800 text-white custom-scrollbar overflow-y-auto">
        <div class="h-full px-3 py-4">
            <div class="flex items-center justify-center mb-8 pb-4 border-b border-indigo-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-mountain text-2xl text-indigo-600"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg">MBLB</h2>
                        <p class="text-xs text-indigo-200">Admin Penetapan</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-menu space-y-2">
            </nav>
        </div>
    </aside>

    <div id="mainContent" class="flex-1 flex flex-col min-w-0 overflow-hidden lg:ml-64 transition-smooth h-screen">
        <nav class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-30 shadow-sm">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                        <i class="fa-solid fa-bars text-xl text-gray-600"></i>
                    </button>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Daftar SPTPD</h1>
                        <p class="text-sm text-gray-500">Daftar SPTPD Rampung yang telah di-TTE Kabid Penetapan</p>
                    </div>
                </div>
                <div class="relative">
                    <button onclick="toggleDropdown('profileDropdown')" class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-100">
                        <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full flex items-center justify-center text-white font-semibold">AD</div>
                    </button>
                    <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                        <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">Keluar</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-1 overflow-y-auto p-6">
            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-green-50/50">
                    <h3 class="font-bold text-green-800 flex items-center gap-2">
                        <i class="fa-solid fa-file-invoice-dollar text-green-600"></i>
                        Dokumen SPTPD Resmi (Self-Assessment)
                    </h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase">Nomor SPTPD</th>
                                <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase">Wajib Pajak</th>
                                <th class="px-4 py-3 text-center text-xs font-semibold text-gray-600 uppercase">Masa Pajak</th>
                                <th class="px-4 py-3 text-right text-xs font-semibold text-gray-600 uppercase">Total Ketetapan</th>
                                <th class="px-4 py-3 text-center text-xs font-semibold text-gray-600 uppercase">Status Validasi</th>
                                <th class="px-4 py-3 text-center text-xs font-semibold text-gray-600 uppercase">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="sptpdTableBody" class="divide-y divide-gray-200 text-sm">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
                <div id="emptyState" class="hidden p-12 text-center text-gray-400">
                    <i class="fa-solid fa-folder-open text-4xl mb-3 text-gray-300"></i>
                    <p class="font-medium">Belum ada SPTPD yang disetujui.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../seed-data.js"></script>
    <script src="../shared.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('mblb_current_user') || '{}');
        if (!currentUser.role || currentUser.role !== 'Admin Penetapan') {
            window.location.href = '../login.html';
        }

        function loadApprovedSPTPD() {
            const sptpds = JSON.parse(localStorage.getItem('mblb_draft_sptpd') || '[]').filter(n => n.status === 'approved').reverse();
            const tbody = document.getElementById('sptpdTableBody');
            const emptyState = document.getElementById('emptyState');

            if (sptpds.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            tbody.innerHTML = sptpds.map(n => {
                const wp = getWajibPajakById(n.wpId);
                return `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-4 py-3">
                            <span class="font-mono text-gray-700 font-bold bg-gray-100 px-2 py-1 rounded text-xs">${n.nomor}</span>
                        </td>
                        <td class="px-4 py-3 font-medium text-gray-900">${wp?.namaUsaha || 'Unknown'}</td>
                        <td class="px-4 py-3 text-center text-gray-600">${n.masaPajak}</td>
                        <td class="px-4 py-3 text-right font-bold text-indigo-700">${formatCurrency(n.total)}</td>
                        <td class="px-4 py-3 text-center">
                            <span class="badge badge-success whitespace-nowrap">
                                <i class="fa-solid fa-signature mr-1.5"></i> TTE Divalidasi BSrE
                            </span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <button onclick="window.open('../documents/draft-sptpd.html?id=${n.id}', '_blank')"
                                class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold hover:bg-indigo-700 transition-colors shadow-sm whitespace-nowrap">
                                <i class="fa-solid fa-print mr-1"></i> Cetak Dokumen
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        loadApprovedSPTPD();
    </script>
</body>
</html>
