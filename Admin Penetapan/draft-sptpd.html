<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data SPTPD - Admin Penetapan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
    <style>
        .filter-btn.active {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
    </style>
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">
    <aside id="sidebar"
        class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full lg:translate-x-0 bg-gradient-to-b from-indigo-900 to-indigo-800 text-white custom-scrollbar overflow-y-auto">
        <div class="h-full px-3 py-4">
            <div class="flex items-center justify-center mb-8 pb-4 border-b border-indigo-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-mountain text-2xl text-indigo-600"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg">MBLB</h2>
                        <p class="text-xs text-indigo-200">Admin Penetapan</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-menu space-y-2">
                <!-- Dynamic sidebar populated by shared.js renderDynamicSidebar() -->
            </nav>
        </div>
    </aside>

    <div id="mainContent" class="flex-1 flex flex-col min-w-0 overflow-hidden lg:ml-64 transition-smooth h-screen">
        <nav class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-30 shadow-sm">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                        <i class="fa-solid fa-bars text-xl text-gray-600"></i>
                    </button>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Data SPTPD</h1>
                        <p class="text-sm text-gray-500">Kumpulan Dokumen SPTPD Wajib Pajak MBLB</p>
                    </div>
                </div>
                <div class="relative">
                    <button onclick="toggleDropdown('profileDropdown')" class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-100">
                        <div class="w-8 h-8 bg-gradient-primary rounded-full flex items-center justify-center text-white font-semibold">AD</div>
                        <i class="fa-solid fa-chevron-down text-sm text-gray-600"></i>
                    </button>
                    <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                        <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                            <i class="fa-solid fa-right-from-bracket w-4 text-center mr-2"></i>Keluar
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-1 overflow-y-auto p-6">
            <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
                <div class="flex flex-col md:flex-row items-center justify-between px-6 py-4 border-b border-gray-100 bg-gray-50 gap-4">
                    <h3 class="font-bold text-gray-900 flex items-center gap-2">
                        <i class="fa-solid fa-file-invoice-dollar text-indigo-600"></i>
                        Semua Data SPTPD
                    </h3>
                    
                    <!-- Filters -->
                    <div class="flex space-x-2 overflow-x-auto w-full md:w-auto pb-2 md:pb-0">
                        <button onclick="filterStatus('all', this)" class="filter-btn active px-4 py-2 text-sm font-semibold rounded-lg border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 transition-colors whitespace-nowrap">Semua Status</button>
                        <button onclick="filterStatus('pending', this)" class="filter-btn px-4 py-2 text-sm font-semibold rounded-lg border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 transition-colors whitespace-nowrap">Menunggu Verifikasi</button>
                        <button onclick="filterStatus('approved', this)" class="filter-btn px-4 py-2 text-sm font-semibold rounded-lg border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 transition-colors whitespace-nowrap">Approved / SKPD Official</button>
                        <button onclick="filterStatus('rejected', this)" class="filter-btn px-4 py-2 text-sm font-semibold rounded-lg border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 transition-colors whitespace-nowrap">Ditolak</button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full" id="notaTable">
                        <thead class="bg-gray-100 border-b border-gray-200">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase">Nomor SPTPD</th>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase">Wajib Pajak</th>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase">Masa Pajak</th>
                                <th class="px-4 py-3 text-right text-xs font-bold text-gray-600 uppercase">Total Tagihan</th>
                                <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase">Status</th>
                                <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="notaTableBody" class="divide-y divide-gray-200 text-sm">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
                <div id="emptyState" class="hidden p-12 text-center text-gray-400">
                    <i class="fa-solid fa-clipboard-list text-4xl mb-3"></i>
                    <p class="font-medium">Tidak ada dokumen SPTPD yang ditemukan untuk filter ini.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../seed-data.js"></script>
    <script src="../shared.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('mblb_current_user') || '{}');
        if (!currentUser.role || currentUser.role !== 'Admin Penetapan') {
            window.location.href = '../index.html';
        }

        let currentFilter = 'all';

        function filterStatus(status, btnElement) {
            currentFilter = status;
            
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active', 'bg-indigo-600', 'text-white'));
            btnElement.classList.add('active', 'bg-indigo-600', 'text-white');
            
            loadNota();
        }

        function loadNota() {
            let notas = JSON.parse(localStorage.getItem('mblb_draft_sptpd') || '[]').reverse();
            
            // Apply filtering logic
            if (currentFilter !== 'all') {
                if(currentFilter === 'approved') {
                    notas = notas.filter(n => n.status === 'approved' || n.status === 'paid' || n.status === 'unpaid');
                } else {
                    notas = notas.filter(n => n.status === currentFilter);
                }
            }

            const tbody = document.getElementById('notaTableBody');
            const emptyState = document.getElementById('emptyState');

            if (notas.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            tbody.innerHTML = notas.map(n => {
                const wp = getWajibPajakById(n.wpId);
                
                let statusBadge = '';
                let actions = '';
                
                // Determine layout based on status
                if (n.status === 'approved' || n.status === 'paid' || n.status === 'unpaid') {
                    statusBadge = `<span class="badge badge-success flex w-fit mx-auto shadow-sm border border-green-200"><i class="fa-solid fa-signature mr-1.5"></i>TTE Divalidasi BSrE</span>`;
                    actions = `
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="window.location.href='detail-sptpd.html?id=${n.id}'" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded border border-gray-300 text-xs font-bold hover:bg-gray-200 transition-colors" title="Lihat Detail Draft SPTPD">
                                <i class="fa-solid fa-eye mr-1"></i> Detail
                            </button>
                            <button onclick="window.open('../documents/draft-sptpd.html?id=${n.id}', '_blank')" class="px-3 py-1.5 bg-indigo-600 text-white rounded text-xs font-bold flex items-center gap-1 hover:bg-indigo-700 shadow-sm" title="Cetak SKPD Final">
                                <i class="fa-solid fa-print"></i> Cetak SKPD
                            </button>
                        </div>
                    `;
                } else if (n.status === 'rejected') {
                    statusBadge = `<span class="badge badge-danger border border-red-200"><i class="fa-solid fa-xmark mr-1"></i>Ditolak</span>`;
                    actions = `
                        <button onclick="window.location.href='detail-sptpd.html?id=${n.id}'" class="px-4 py-1.5 bg-white border border-gray-300 shadow-sm text-gray-700 rounded-lg text-xs font-bold hover:bg-gray-50 transition-colors whitespace-nowrap">
                            <i class="fa-solid fa-eye mr-1"></i> Detail
                        </button>
                    `;
                } else {
                    statusBadge = `<span class="badge badge-warning border border-yellow-200"><i class="fa-solid fa-hourglass-half mr-1"></i>Pending</span>`;
                    actions = `
                        <button onclick="window.location.href='detail-sptpd.html?id=${n.id}'" class="px-4 py-1.5 bg-white border border-gray-300 shadow-sm text-indigo-700 rounded-lg text-xs font-bold hover:bg-indigo-50 hover:border-indigo-300 transition-colors whitespace-nowrap">
                            <i class="fa-solid fa-eye mr-1"></i> Detail
                        </button>
                    `;
                }

                return `
                    <tr class="hover:bg-indigo-50/30 transition-colors">
                        <td class="px-4 py-4">
                            <div class="font-mono text-gray-900 font-bold tracking-tight">${n.nomor}</div>
                            ${(n.status==='approved'||n.status==='paid'||n.status==='unpaid') ? '<div class="text-[10px] uppercase font-bold text-green-600 mt-1 tracking-widest">Resmi SKPD</div>' : '<div class="text-[10px] uppercase font-bold text-gray-400 mt-1 tracking-widest">Self Assessed Draft</div>'}
                        </td>
                        <td class="px-4 py-4 font-bold text-gray-900">
                            ${wp?.namaUsaha || 'Unknown'}
                            <div class="text-xs text-gray-500 font-normal mt-0.5"><i class="fa-regular fa-calendar mr-1"></i>Sub: ${formatDate(n.tanggal)}</div>
                        </td>
                        <td class="px-4 py-4 text-gray-600 uppercase font-bold text-xs tracking-wider">${n.masaPajak}</td>
                        <td class="px-4 py-4 text-right font-black text-indigo-700 text-base font-mono">${formatCurrency(n.total)}</td>
                        <td class="px-4 py-4 text-center">${statusBadge}</td>
                        <td class="px-4 py-4 text-center">${actions}</td>
                    </tr>
                `;
            }).join('');
        }

        // Initially load
        document.addEventListener('DOMContentLoaded', () => {
            // Force rendering sidebar
            if(window.renderDynamicSidebar) renderDynamicSidebar();
            
            loadNota();
        });
    </script>
</body>

</html>
