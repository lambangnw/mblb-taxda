    <script src="../seed-data.js"></script>
    <script src="../shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadBillingRequests();
        });

        function loadBillingRequests() {
            let billingRequests = JSON.parse(localStorage.getItem('siparek_billing_requests') || '[]');

            if (billingRequests.length === 0 && typeof SEED_DATA !== 'undefined') {
                billingRequests = SEED_DATA.billing_requests;
                localStorage.setItem('siparek_billing_requests', JSON.stringify(billingRequests));
            }
            const tbody = document.getElementById('billingTableBody');

            if (billingRequests.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="p-8 text-center text-gray-500">
                            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-folder-open text-2xl text-gray-400"></i>
                            </div>
                            <p class="font-medium">Tidak ada antrian penerbitan billing.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = billingRequests.map(item => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4">
                        <span class="font-mono text-sm font-bold text-indigo-600">${item.nomor}</span>
                    </td>
                    <td class="p-4">
                        <div class="font-semibold text-gray-900">${item.pemohon}</div>
                    </td>
                    <td class="p-4 text-sm text-gray-600">
                        ${item.objek}
                    </td>
                    <td class="p-4 text-right font-bold text-gray-900">
                        ${formatCurrency(item.nilai_pajak)}
                    </td>
                    <td class="p-4 text-sm text-gray-500">
                        <div class="flex items-center gap-2">
                            <i class="fa-regular fa-calendar"></i>
                            ${item.tanggal_approval_kabid}
                        </div>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="generateBilling('${item.id}')" 
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-all shadow-sm hover:shadow-md flex items-center gap-2 mx-auto">
                            <i class="fa-solid fa-qrcode"></i> Terbitkan Billing
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function generateBilling(id) {
            Swal.fire({
                title: 'Terbitkan Kode Billing?',
                text: "Sistem akan men-generate kode bayar (VA/QRIS) untuk Wajib Pajak.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Ya, Terbitkan!',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    processBillingGeneration(id);
                }
            });
        }

        function processBillingGeneration(billingId) {
            // 1. Get Data
            let billingRequests = JSON.parse(localStorage.getItem('siparek_billing_requests')) || [];
            const request = billingRequests.find(b => b.id === billingId);

            if (!request) return;

            // 2. Create Tagihan (Bill)
            const tagihanList = JSON.parse(localStorage.getItem('siparek_tagihan')) || [];
            const newBill = {
                id: 'SKR-' + new Date().getFullYear() + '-' + Math.floor(Math.random() * 1000),
                npwpd: '123456789012000X', // Mock
                nama_wp: request.pemohon,
                objek_id: 'R-' + Math.floor(Math.random() * 1000),
                objek: request.objek,
                periode: 'Feb ' + new Date().getFullYear(),
                masa_pajak_mulai: new Date().toISOString().split('T')[0],
                masa_pajak_selesai: new Date(new Date().setMonth(new Date().getMonth() + 1)).toISOString().split('T')[0],
                nominal: request.nilai_pajak,
                status: 'belum_bayar',
                tanggal_tagihan: new Date().toISOString().split('T')[0],
                jatuh_tempo: new Date(new Date().setMonth(new Date().getMonth() + 1)).toISOString().split('T')[0]
            };

            tagihanList.push(newBill);
            localStorage.setItem('siparek_tagihan', JSON.stringify(tagihanList));

            // 3. Remove from Billing Requests
            billingRequests = billingRequests.filter(b => b.id !== billingId);
            localStorage.setItem('siparek_billing_requests', JSON.stringify(billingRequests));

            // 4. Update Stats
            const stats = JSON.parse(localStorage.getItem('siparek_stats')) || {};
            if (stats.penagihan) {
                stats.penagihan.menunggu_billing = Math.max(0, (stats.penagihan.menunggu_billing || 0) - 1);
                localStorage.setItem('siparek_stats', JSON.stringify(stats));
            }

            // 5. Show Success & Reload
            Swal.fire(
                'Berhasil!',
                'Kode Billing telah diterbitkan. Wajib Pajak dapat segera melakukan pembayaran.',
                'success'
            ).then(() => {
                loadBillingRequests();
                // Update badge if exists in parent/sidebar (simple reload handles it for now)
            });
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(amount);
        }
    </script>
