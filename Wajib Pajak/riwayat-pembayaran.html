<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pembayaran - Wajib Pajak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full lg:translate-x-0 bg-gradient-to-b from-indigo-900 to-indigo-800 text-white custom-scrollbar overflow-y-auto">
        <div class="h-full px-3 py-4">
            <div class="flex items-center justify-center mb-8 pb-4 border-b border-indigo-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-mountain text-2xl text-indigo-600"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg">MBLB</h2>
                        <p class="text-xs text-indigo-200">Wajib Pajak</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-menu space-y-2">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-700 transition-smooth">
                    <i class="fa-solid fa-chart-pie w-5 text-center"></i>
                    <span class="font-medium">Dashboard</span>
                </a>
                <div class="pt-4 pb-2">
                    <p class="px-4 text-xs font-semibold text-indigo-300 uppercase">Layanan Utama</p>
                </div>
                <a href="lapor-sptpd.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-700 transition-smooth">
                    <i class="fa-solid fa-file-pen w-5 text-center"></i>
                    <span class="font-medium">Lapor SPTPD</span>
                </a>
                <a href="tagihan-aktif.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-700 transition-smooth">
                    <i class="fa-solid fa-file-invoice-dollar w-5 text-center"></i>
                    <span class="font-medium">Tagihan Aktif</span>
                </a>
                <a href="riwayat-pembayaran.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg bg-indigo-700 transition-smooth">
                    <i class="fa-solid fa-clock-rotate-left w-5 text-center"></i>
                    <span class="font-medium">Riwayat</span>
                </a>
                <div class="pt-4 pb-2">
                    <p class="px-4 text-xs font-semibold text-indigo-300 uppercase">Akun</p>
                </div>
                <button onclick="logout()"
                    class="flex items-center gap-3 w-full px-4 py-3 rounded-lg hover:bg-red-600/20 text-red-200 hover:text-red-100 transition-smooth">
                    <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>
                    <span class="font-medium">Keluar</span>
                </button>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <div id="mainContent" class="flex-1 flex flex-col min-w-0 overflow-hidden lg:ml-64 transition-smooth h-screen">
        <header class="bg-white shadow-sm z-10 sticky top-0">
            <div class="flex items-center justify-between px-6 py-4">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                        <i class="fa-solid fa-bars text-xl text-gray-600"></i>
                    </button>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Riwayat Pembayaran</h1>
                        <p class="text-sm text-gray-500">Arsip SSPD & Bukti Bayar</p>
                    </div>
                </div>
                <!-- Profile -->
                <div class="relative">
                    <button onclick="toggleDropdown('profileDropdown')"
                        class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-100">
                        <div
                            class="w-8 h-8 bg-gradient-primary rounded-full flex items-center justify-center text-white font-semibold">
                            WP</div>
                    </button>
                    <div id="profileDropdown"
                        class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                        <button onclick="logout()"
                            class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">Logout</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex items-center justify-between flex-wrap gap-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-receipt text-green-600"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900">Daftar Setoran Pajak</h3>
                            <p class="text-xs text-gray-500">Semua riwayat transaksi berhasil</p>
                        </div>
                    </div>
                    <div class="relative">
                        <input type="text" placeholder="Cari nomor dokumen..."
                            class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 w-64">
                        <i
                            class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr
                                class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b border-gray-100">
                                <th class="px-6 py-4 font-semibold">No. SSPD</th>
                                <th class="px-6 py-4 font-semibold">Tanggal</th>
                                <th class="px-6 py-4 font-semibold">Metode</th>
                                <th class="px-6 py-4 font-semibold text-right">Jumlah</th>
                                <th class="px-6 py-4 font-semibold text-center">Status</th>
                                <th class="px-6 py-4 font-semibold text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody" class="divide-y divide-gray-50 text-sm">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>

                <div class="p-4 border-t border-gray-100 bg-gray-50 flex justify-center">
                    <span class="text-xs text-gray-400">Menampilkan semua riwayat transaksi</span>
                </div>
            </div>
        </main>
    </div>

    <script src="../seed-data.js"></script>
    <script src="../shared.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('mblb_current_user') || '{}');
        if (!currentUser.role || currentUser.role !== 'Wajib Pajak') {
            window.location.href = '../index.html';
        }

        let currentWpId = 'WP001';
        const wps = JSON.parse(localStorage.getItem('mblb_wajib_pajak') || '[]');
        const matchedWp = wps.find(w => w.nama === currentUser.nama);
        if (matchedWp) currentWpId = matchedWp.id;

        function loadHistory() {
            const sspds = JSON.parse(localStorage.getItem('mblb_sspd') || '[]');
            const mySspds = sspds.filter(s => s.wpId === currentWpId).reverse();
            const container = document.getElementById('historyTableBody');

            if (mySspds.length === 0) {
                container.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center py-12">
                            <div class="flex flex-col items-center justify-center text-gray-400">
                                <i class="fa-regular fa-folder-open text-4xl mb-2"></i>
                                <p class="text-sm">Belum ada riwayat pembayaran</p>
                            </div>
                        </td>
                    </tr>`;
                return;
            }

            container.innerHTML = mySspds.map(s => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4">
                        <span class="font-mono text-indigo-600 font-bold bg-indigo-50 px-2 py-1 rounded text-xs">${s.nomor}</span>
                    </td>
                    <td class="px-6 py-4 text-gray-600">
                        <div class="flex items-center gap-2">
                            <i class="fa-regular fa-calendar-check text-gray-400"></i>
                            ${formatDate(s.tanggal)}
                        </div>
                    </td>
                    <td class="px-6 py-4 text-gray-600">
                        <span class="inline-flex items-center gap-1.5 border border-gray-200 px-2 py-1 rounded text-xs font-medium">
                            <i class="fa-solid fa-building-columns text-gray-400"></i>
                            ${s.caraBayar || 'Bank Transfer'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right font-black text-gray-900">${formatCurrency(s.jumlah)}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="badge badge-success ring-1 ring-inset ring-green-600/20">Lunas</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="printSSPD('${s.id}')" 
                            class="text-indigo-600 hover:text-indigo-800 font-semibold text-xs bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg border border-indigo-200 transition-all">
                            <i class="fa-solid fa-print mr-1"></i>Cetak
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function printSSPD(id) {
            window.open('../documents/sspd.html?id=' + id, '_blank');
        }

        loadHistory();
    </script>
</body>

</html>
