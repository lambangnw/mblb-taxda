<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Wajib Pajak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared.css">
</head>

<body class="bg-gray-50">
    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full lg:translate-x-0 bg-gradient-to-b from-indigo-900 to-indigo-800 text-white custom-scrollbar overflow-y-auto">
        <div class="h-full px-3 py-4">
            <div class="flex items-center justify-center mb-8 pb-4 border-b border-indigo-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-mountain text-2xl text-indigo-600"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg">MBLB</h2>
                        <p class="text-xs text-indigo-200">Wajib Pajak</p>
                    </div>
                </div>
            </div>
            <nav class="sidebar-menu space-y-2">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg bg-indigo-700 transition-smooth">
                    <i class="fa-solid fa-chart-pie w-5 text-center"></i>
                    <span class="font-medium">Dashboard</span>
                </a>
                <div class="pt-4 pb-2">
                    <p class="px-4 text-xs font-semibold text-indigo-300 uppercase">Layanan Utama</p>
                </div>
                <a href="lapor-sptpd.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-700 transition-smooth">
                    <i class="fa-solid fa-file-pen w-5 text-center"></i>
                    <span class="font-medium">Lapor SPTPD</span>
                </a>
                <a href="tagihan-aktif.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-700 transition-smooth">
                    <i class="fa-solid fa-file-invoice-dollar w-5 text-center"></i>
                    <span class="font-medium">Tagihan Aktif</span>
                </a>
                <a href="riwayat-pembayaran.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-indigo-700 transition-smooth">
                    <i class="fa-solid fa-clock-rotate-left w-5 text-center"></i>
                    <span class="font-medium">Riwayat</span>
                </a>
                <div class="pt-4 pb-2">
                    <p class="px-4 text-xs font-semibold text-indigo-300 uppercase">Akun</p>
                </div>
                <button onclick="logout()"
                    class="flex items-center gap-3 w-full px-4 py-3 rounded-lg hover:bg-red-600/20 text-red-200 hover:text-red-100 transition-smooth">
                    <i class="fa-solid fa-right-from-bracket w-5 text-center"></i>
                    <span class="font-medium">Keluar</span>
                </button>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <div id="mainContent" class="lg:ml-64 transition-smooth">
        <!-- Top Navbar -->
        <nav class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-30 shadow-sm">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                        <i class="fa-solid fa-bars text-xl text-gray-600"></i>
                    </button>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Dashboard</h1>
                        <p class="text-sm text-gray-500">Selamat datang kembali</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <button onclick="toggleDropdown('profileDropdown')"
                            class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-100">
                            <div
                                class="w-8 h-8 bg-gradient-primary rounded-full flex items-center justify-center text-white font-semibold">
                                WP</div>
                            <div class="hidden md:block text-left">
                                <p class="text-sm font-semibold text-gray-900" id="userName">User</p>
                                <p class="text-xs text-gray-500">Wajib Pajak</p>
                            </div>
                            <i class="fa-solid fa-chevron-down text-sm text-gray-600"></i>
                        </button>
                        <div id="profileDropdown"
                            class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
                            <button onclick="logout()"
                                class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                                <i class="fa-solid fa-right-from-bracket w-4 text-center mr-2"></i>Keluar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Dashboard Content -->
        <main class="p-6">
            <!-- Welcome Banner -->
            <div
                class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl p-8 mb-6 text-white shadow-xl relative overflow-hidden">
                <div
                    class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none">
                </div>
                <div class="flex items-center justify-between relative z-10">
                    <div>
                        <h2 class="text-3xl font-black mb-2">Total Tagihan Belum Dibayar</h2>
                        <h3 class="text-4xl font-bold mb-4" id="totalUnpaid">Rp 0</h3>
                        <div class="flex gap-3">
                            <a href="lapor-sptpd.html"
                                class="px-6 py-2 bg-indigo-500/30 border border-indigo-400/30 text-white rounded-lg font-bold hover:bg-indigo-500/50 transition-all backdrop-blur-sm">
                                <i class="fa-solid fa-plus mr-2"></i>Lapor SPTPD
                            </a>
                            <a href="tagihan-aktif.html"
                                class="px-6 py-2 bg-white text-indigo-600 rounded-lg font-bold hover:bg-indigo-50 transition-all shadow-lg">
                                <i class="fa-solid fa-wallet mr-2"></i>Bayar Sekarang
                            </a>
                        </div>
                    </div>
                    <div class="hidden md:block">
                        <div class="w-32 h-32 bg-white/20 rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-file-invoice-dollar text-6xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <!-- SPTPD Diterima -->
                <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100 card-hover">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-file-invoice text-2xl text-blue-600"></i>
                        </div>
                        <span
                            class="text-xs font-semibold text-blue-600 bg-blue-100 px-2 py-1 rounded-full">Total</span>
                    </div>
                    <h3 class="text-gray-500 text-sm font-medium mb-1">SPTPD Diterima</h3>
                    <p class="text-3xl font-bold text-gray-900" id="sptpdCount">0</p>
                </div>

                <!-- Sudah Dibayar -->
                <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100 card-hover">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-receipt text-2xl text-green-600"></i>
                        </div>
                        <span
                            class="text-xs font-semibold text-green-600 bg-green-100 px-2 py-1 rounded-full">Lunas</span>
                    </div>
                    <h3 class="text-gray-500 text-sm font-medium mb-1">Sudah Dibayar</h3>
                    <p class="text-3xl font-bold text-gray-900" id="paidCount">0</p>
                </div>

                <!-- Volume Dilaporkan -->
                <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100 card-hover">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-orange-100 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-truck-loading text-2xl text-orange-600"></i>
                        </div>
                        <span
                            class="text-xs font-semibold text-orange-600 bg-orange-100 px-2 py-1 rounded-full">Volume</span>
                    </div>
                    <h3 class="text-gray-500 text-sm font-medium mb-1">Total Volume</h3>
                    <p class="text-3xl font-bold text-gray-900" id="totalVolume">0 m³</p>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                <h3 class="text-lg font-bold text-gray-900 mb-4">Riwayat Pembayaran Terakhir</h3>
                <div id="recentPayments" class="space-y-4">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="../seed-data.js"></script>
    <script src="../shared.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('mblb_current_user') || '{}');
        if (!currentUser.role || currentUser.role !== 'Wajib Pajak') {
            window.location.href = '../index.html';
        }
        document.getElementById('userName').textContent = currentUser.namaUsaha || currentUser.nama;

        let currentWpId = 'WP001'; // Default for demo
        const wps = JSON.parse(localStorage.getItem('mblb_wajib_pajak') || '[]');
        const matchedWp = wps.find(w => w.nama === currentUser.nama);
        if (matchedWp) currentWpId = matchedWp.id;

        const sptpds = JSON.parse(localStorage.getItem('mblb_draft_sptpd') || '[]').filter(s => s.wpId === currentWpId && (s.status === 'approved' || s.status === 'paid'));
        const unpaid = sptpds.filter(s => s.status === 'approved');
        const paid = sptpds.filter(s => s.status === 'paid');

        const totalUnpaidAmount = unpaid.reduce((acc, curr) => acc + curr.total, 0);
        document.getElementById('totalUnpaid').textContent = formatCurrency(totalUnpaidAmount);
        document.getElementById('sptpdCount').textContent = sptpds.length;
        document.getElementById('paidCount').textContent = paid.length;

        const rekaps = JSON.parse(localStorage.getItem('mblb_rekap_bulanan') || '[]').filter(r => r.wpId === currentWpId);
        const totalVol = rekaps.reduce((acc, curr) => acc + curr.totalVolume, 0);
        document.getElementById('totalVolume').textContent = totalVol + ' m³';

        const recentList = document.getElementById('recentPayments');
        if (paid.length === 0) {
            recentList.innerHTML = `<div class="text-center py-8 text-gray-500"><i class="fa-solid fa-inbox text-4xl mb-2 text-gray-300"></i><p>Belum ada riwayat pembayaran</p></div>`;
        } else {
            recentList.innerHTML = paid.slice(0, 3).map(p => `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100 hover:bg-gray-100 transition-smooth">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center text-green-600">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-900">${p.nomor}</p>
                            <p class="text-xs text-gray-500">${formatDate(p.tanggal)}</p>
                        </div>
                    </div>
                    <span class="font-bold text-green-600">${formatCurrency(p.total)}</span>
                </div>
            `).join('');
        }
    </script>
</body>

</html>
