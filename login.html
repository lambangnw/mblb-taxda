<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MBLB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>

<body
    class="bg-gradient-to-br from-indigo-900 via-purple-900 to-indigo-800 min-h-screen flex items-center justify-center p-4">
    <!-- Background Pattern -->
    <div class="absolute inset-0 bg-pattern opacity-10"></div>

    <div class="max-w-md w-full relative z-10">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-2xl mb-4 transform hover:scale-110 transition-transform">
                <i class="fa-solid fa-mountain text-4xl text-indigo-600"></i>
            </div>
            <h1 class="text-4xl font-black text-white mb-2">MBLB</h1>
            <p class="text-indigo-200 text-lg">Sistem Informasi Pajak Galian C</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-2 text-center">Masuk ke Sistem</h2>
            <p class="text-center text-gray-500 text-sm mb-8">Pilih role untuk quick login demo</p>

            <!-- Quick Login Buttons -->
            <div class="space-y-3">
                <button onclick="quickLogin('Wajib Pajak')"
                    class="w-full px-4 py-4 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-xl text-sm font-bold hover:shadow-xl transform hover:scale-105 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-user text-lg"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-bold">Wajib Pajak</p>
                            <p class="text-xs text-blue-100">PT. Minerba Makmur</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition-transform"></i>
                </button>

                <button onclick="quickLogin('Bidang Pendaftaran')"
                    class="w-full px-4 py-4 bg-gradient-to-r from-pink-500 to-rose-600 text-white rounded-xl text-sm font-bold hover:shadow-xl transform hover:scale-105 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-desktop text-lg"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-bold">Bidang Pendaftaran</p>
                            <p class="text-xs text-pink-100">Dewi Sartika (Loket)</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition-transform"></i>
                </button>



                <button onclick="quickLogin('Staff Lapangan')"
                    class="w-full px-4 py-4 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-xl text-sm font-bold hover:shadow-xl transform hover:scale-105 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-clipboard-user text-lg"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-bold">Staff Lapangan</p>
                            <p class="text-xs text-emerald-100">Budi Santoso (Checker)</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition-transform"></i>
                </button>

                <button onclick="quickLogin('Admin Penetapan')"
                    class="w-full px-4 py-4 bg-gradient-to-r from-orange-500 to-red-600 text-white rounded-xl text-sm font-bold hover:shadow-xl transform hover:scale-105 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-building-columns text-lg"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-bold">Admin Penetapan</p>
                            <p class="text-xs text-orange-100">Siti Aminah (Verifikator)</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition-transform"></i>
                </button>

                <button onclick="quickLogin('Admin Sistem')"
                    class="w-full px-4 py-4 bg-gradient-to-r from-gray-700 to-gray-900 text-white rounded-xl text-sm font-bold hover:shadow-xl transform hover:scale-105 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-cogs text-lg"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-bold">Admin Sistem</p>
                            <p class="text-xs text-gray-300">Super Admin (Konfigurasi)</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition-transform"></i>
                </button>

                <button onclick="quickLogin('Kabid Penetapan')"
                    class="w-full px-4 py-4 bg-gradient-to-r from-purple-500 to-pink-600 text-white rounded-xl text-sm font-bold hover:shadow-xl transform hover:scale-105 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-user-tie text-lg"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-bold">Kabid Penetapan</p>
                            <p class="text-xs text-purple-100">Drs. H. Ahmad Yani</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition-transform"></i>
                </button>

                <button onclick="quickLogin('Bidang Penagihan')"
                    class="w-full px-4 py-4 bg-gradient-to-r from-blue-700 to-indigo-900 text-white rounded-xl text-sm font-bold hover:shadow-xl transform hover:scale-105 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-file-invoice-dollar text-lg"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-bold">Bidang Penagihan</p>
                            <p class="text-xs text-indigo-100">Rian Hidayat (Kolektor)</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition-transform"></i>
                </button>

                <button onclick="quickLogin('Kepala Dinas')"
                    class="w-full px-4 py-4 bg-gradient-to-r from-amber-500 to-orange-600 text-white rounded-xl text-sm font-bold hover:shadow-xl transform hover:scale-105 transition-all flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                            <i class="fa-solid fa-landmark text-lg"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-bold">Kepala Dinas</p>
                            <p class="text-xs text-amber-100">Executive Dashboard</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right group-hover:translate-x-2 transition-transform"></i>
                </button>
            </div>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-500 font-semibold">Info</span>
                </div>
            </div>

            <!-- Info Note -->
            <div class="text-center">
                <p class="text-gray-600 text-xs">
                    <i class="fa-solid fa-info-circle text-indigo-600 mr-1"></i>
                    Klik role untuk masuk ke dashboard simulasi
                </p>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6">
            <button onclick="window.location.href='index.html'"
                class="text-indigo-200 hover:text-white font-semibold text-sm transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i>Kembali ke Beranda
            </button>
        </div>
        <div class="text-center mt-4 text-indigo-200 text-sm">
            <p>&copy; 2026 MBLB System. All rights reserved.</p>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        // Role dashboard mapping
        const roleDashboards = {
            'Wajib Pajak': 'Wajib Pajak/dashboard.html',
            'Bidang Pendaftaran': 'Bidang Pendaftaran/dashboard.html',
            'Staff Lapangan': 'Staff Lapangan/dashboard.html',
            'Admin Penetapan': 'Admin Penetapan/dashboard.html',
            'Admin Sistem': 'Admin Sistem/dashboard.html',
            'Kabid Penetapan': 'Kabid Penetapan/dashboard.html',
            'Bidang Penagihan': 'Bidang Penagihan/dashboard.html',
            'Kepala Dinas': 'Kepala Dinas/dashboard.html'
        };

        // Demo credentials
        const demoCredentials = {
            'Wajib Pajak': { username: 'wp.demo', name: 'PT. Minerba Makmur' },
            'Bidang Pendaftaran': { username: 'fo.demo', name: 'Dewi Sartika' },
            'Staff Lapangan': { username: 'staff.demo', name: 'Budi Santoso' },

            'Admin Penetapan': { username: 'admin.demo', name: 'Siti Aminah' },
            'Admin Sistem': { username: 'sysadmin', name: 'Administrator' },
            'Kabid Penetapan': { username: 'kabid.demo', name: 'Drs. H. Ahmad Yani' },
            'Bidang Penagihan': { username: 'penagihan.demo', name: 'Rian Hidayat' },
            'Kepala Dinas': { username: 'kadis.demo', name: 'Ir. H. Syamsul Bahri, M.Si' }
        };

        // Quick Login Function
        function quickLogin(role) {
            if (!demoCredentials[role]) {
                showToast('Role tidak ditemukan', 'error');
                return;
            }

            // Show loading toast
            showToast(`Login sebagai ${role}...`, 'info');

            // Save login info
            setTimeout(() => {
                localStorage.setItem('mblb_current_user', JSON.stringify({
                    username: demoCredentials[role].username,
                    name: demoCredentials[role].name,
                    role: role,
                    loginTime: new Date().toISOString()
                }));

                showToast('Login berhasil!', 'success');

                // Redirect
                setTimeout(() => {
                    logActivity('Login Sistem', `User ${demoCredentials[role].name} (${role}) berhasil masuk ke sistem.`);
                    window.location.href = roleDashboards[role];
                }, 500);
            }, 500);
        }
    </script>

    <style>
        .bg-pattern {
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255, 255, 255, .05) 35px, rgba(255, 255, 255, .05) 70px);
        }
    </style>
</body>

</html>
